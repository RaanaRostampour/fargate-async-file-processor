services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    environment:
      STORAGE_BACKEND: local
      QUEUE_BACKEND: local
      AWS_REGION: eu-central-1
      S3_BUCKET: placeholder-bucket
      SQS_QUEUE_URL: placeholder-queue-url

  worker:
    build: ./worker
    volumes:
      - ./storage:/app/storage
    environment:
      STORAGE_BACKEND: local
      QUEUE_BACKEND: local
      AWS_REGION: eu-central-1
      S3_BUCKET: placeholder-bucket
      SQS_QUEUE_URL: placeholder-queue-url
